<svg viewBox="0 0 100 100" width="100" height="100" style="overflow: visible;" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent-cyan, #00f2fe)" />
      <stop offset="100%" stop-color="var(--accent, #3866f2)" />
    </linearGradient>
    <linearGradient id="logo-gradient-alt" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="var(--accent-cyan, #00f2fe)" />
      <stop offset="100%" stop-color="var(--accent, #3866f2)" />
    </linearGradient>
    <filter id="logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="logo-glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    :root {
      --accent-cyan: #00f2fe;
      --accent: #3866f2;
    }
    @keyframes logo-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes logo-spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes logo-pulse {
      0%, 100% { opacity: 0.75; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }
    .spinning-orbit-1 {
      transform-origin: 50px 50px;
      animation: logo-spin 20s linear infinite;
    }
    .spinning-orbit-2 {
      transform-origin: 50px 50px;
      animation: logo-spin-reverse 15s linear infinite;
    }
    .glowing-eye {
      transform-origin: 28px 46px;
      animation: logo-pulse 2s ease-in-out infinite;
    }
  </style>

  <!-- Futuristic Corner HUD Frame (Glow layer) -->
  <g fill="none" stroke="var(--accent-cyan)" stroke-width="4" stroke-linecap="round" filter="url(#logo-glow)" opacity="0.25">
    <path d="M 39.5 16 L 50 10 L 60.5 16" />
    <path d="M 39.5 84 L 50 90 L 60.5 84" />
    <path d="M 74.5 24 L 85 30 L 85 42" />
    <path d="M 85 58 L 85 70 L 74.5 76" />
    <path d="M 25.5 24 L 15 30 L 15 42" />
    <path d="M 15 58 L 15 70 L 25.5 76" />
  </g>

  <!-- Futuristic Corner HUD Frame (Crisp layer) -->
  <g fill="none" stroke="url(#logo-gradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
    <path d="M 39.5 16 L 50 10 L 60.5 16" />
    <path d="M 39.5 84 L 50 90 L 60.5 84" />
    <path d="M 74.5 24 L 85 30 L 85 42" />
    <path d="M 85 58 L 85 70 L 74.5 76" />
    <path d="M 25.5 24 L 15 30 L 15 42" />
    <path d="M 15 58 L 15 70 L 25.5 76" />
  </g>

  <!-- Background Rotating Orbits -->
  <g class="spinning-orbit-1" opacity="0.35">
    <circle cx="50" cy="50" r="38" fill="none" stroke="url(#logo-gradient)" stroke-width="1" stroke-dasharray="8 16" />
    <circle cx="50" cy="12" r="2" fill="var(--accent-cyan)" />
  </g>
  <g class="spinning-orbit-2" opacity="0.45">
    <circle cx="50" cy="50" r="30" fill="none" stroke="url(#logo-gradient-alt)" stroke-width="1" stroke-dasharray="40 10 10 10" />
    <circle cx="50" cy="20" r="1.5" fill="#ffffff" />
  </g>

  <!-- Glowing Chameleon Body (Back Glow) -->
  <g fill="none" stroke="var(--accent-cyan)" stroke-linecap="round" filter="url(#logo-glow)" opacity="0.35">
    <path d="M 18 36 C 25 22, 50 18, 68 28 C 85 38, 90 60, 80 75 C 70 90, 48 90, 42 78 C 36 66, 48 55, 58 60 C 66 64, 68 74, 60 76 C 56 77, 54 73, 56 70 C 58 67, 62 68, 61 71" stroke-width="8" />
    <path d="M 18 36 C 14 44, 18 56, 28 62 C 38 68, 48 64, 48 64" stroke-width="8" />
    <path d="M 30 25 C 38 18, 52 18, 64 24" stroke-width="5" stroke-dasharray="1 8" />
  </g>

  <!-- Crisp Chameleon Body (Front Gradient Layer) -->
  <g fill="none" stroke-linecap="round">
    <path d="M 18 36 C 25 22, 50 18, 68 28 C 85 38, 90 60, 80 75 C 70 90, 48 90, 42 78 C 36 66, 48 55, 58 60 C 66 64, 68 74, 60 76 C 56 77, 54 73, 56 70 C 58 67, 62 68, 61 71" stroke="url(#logo-gradient)" stroke-width="4.5" />
    <path d="M 18 36 C 14 44, 18 56, 28 62 C 38 68, 48 64, 48 64" stroke="url(#logo-gradient)" stroke-width="4.5" />
    <path d="M 30 25 C 38 18, 52 18, 64 24" stroke="url(#logo-gradient-alt)" stroke-width="3" stroke-dasharray="1 7" />
  </g>

  <!-- Eye of the Chameleon (Futuristic Target Core) -->
  <g class="glowing-eye">
    <circle cx="28" cy="46" r="8" fill="none" stroke="var(--accent-cyan)" stroke-width="2.5" filter="url(#logo-glow)" opacity="0.6" />
    <circle cx="28" cy="46" r="5" fill="none" stroke="url(#logo-gradient)" stroke-width="1.5" />
    <circle cx="28" cy="46" r="2.5" fill="#ffffff" filter="url(#logo-glow-soft)" />
  </g>
</svg>
